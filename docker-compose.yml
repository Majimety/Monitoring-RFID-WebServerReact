services:
  # ─────────────────────────────────────────
  # Backend — Python Flask + Flask-SocketIO
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rfid-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=True
      - PORT=5000
      - HOST=0.0.0.0
      - DATABASE_PATH=/app/data/database.db
      - UPLOAD_FOLDER=/app/photos
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - db-data:/app/data        # SQLite persistent
      - photos-data:/app/photos  # รูปภาพ persistent
    networks:
      - rfid-network

  # ─────────────────────────────────────────
  # Frontend — React build + Nginx
  # ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: rfid-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - rfid-network

# ─────────────────────────────────────────
volumes:
  db-data:
  photos-data:

networks:
  rfid-network:
    driver: bridge